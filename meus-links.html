<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus Santos — Links</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Italiana&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="_css/meus-links.css">
</head>

<body>

    <!-- PARTICLES BACKGROUND -->
    <div id="particles-js"></div>

    <div class="card">

        <!-- AVATAR -->
        <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <div class="avatar-ring avatar-ring-2"></div>
            <div class="avatar-glow"></div>
            <img class="avatar" src="Imagens/foto1.jpg" alt="Matheus Santos"
                onerror="this.style.background='#111328';this.removeAttribute('src')">
            <div class="avatar-status"></div>
        </div>

        <!-- NAME -->
        <h1 class="profile-name">Matheus Santos</h1>
        <p class="profile-role">Desenvolvedor Web</p>
        <span class="profile-tag">Disponível para projetos</span>

        <div class="divider"></div>

        <!-- LINKS -->
        <ul class="links-list">

            <li class="link-item">
                <a class="link-btn" href="https://www.instagram.com/theus_santtos2/" target="_blank" rel="noopener">
                    <span class="link-icon"><i class="fa-brands fa-instagram"></i></span>
                    <span class="link-label">Instagram</span>
                    <i class="fa-solid fa-arrow-right link-arrow"></i>
                </a>
            </li>

            <li class="link-item">
                <a class="link-btn" href="https://mjdesenvolvedor.com.br/" target="_blank" rel="noopener">
                    <span class="link-icon"><i class="fa-solid fa-address-book"></i></span>
                    <span class="link-label">Portfólio</span>
                    <i class="fa-solid fa-arrow-right link-arrow"></i>
                </a>
            </li>

            <li class="link-item">
                <a class="link-btn" href="https://www.linkedin.com/in/matheus-santos-b48833187/" target="_blank"
                    rel="noopener">
                    <span class="link-icon"><i class="fa-brands fa-linkedin-in"></i></span>
                    <span class="link-label">LinkedIn</span>
                    <i class="fa-solid fa-arrow-right link-arrow"></i>
                </a>
            </li>

            <li class="link-item">
                <a class="link-btn" href="https://github.com/matheus1289" target="_blank" rel="noopener">
                    <span class="link-icon"><i class="fa-brands fa-github"></i></span>
                    <span class="link-label">GitHub</span>
                    <i class="fa-solid fa-arrow-right link-arrow"></i>
                </a>
            </li>

            <li class="link-item">
                <a class="link-btn" href="pdf/currículoAtualizado.pdf" target="_blank" rel="noopener">
                    <span class="link-icon"><i class="fa-solid fa-file-pdf"></i></span>
                    <span class="link-label">Currículo</span>
                    <i class="fa-solid fa-arrow-right link-arrow"></i>
                </a>
            </li>

        </ul>

        <p class="card-footer">© 2025 <span>Matheus Santos</span> — Dev</p>
    </div>

    <script type="text/javascript" src="js/particles.js"></script>
    <script type="text/javascript" src="js/app.js"></script>
</body>

</html>
